<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="responsive grid.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responive Grid</title>
</head>
<body>
    <div class="wrapper">

        <div class="navbar">
            <div class="banner">BANNER</div>
        </div>

        <div class="header">
            <h2>TECHNOZI</h2>
        </div>

        <div class="main">
            <h1>TECHNOZI</h1>
            <p>Bringing all the latest tech news to your fingertips</p>
            <img src="apple_iphone12.png" alt="an iphone">
        </div>

        <div class="aside">
            <div class="signup">
                <h2>SIGN UP</h2>
                <form class="form-control">
                    <input type="text">
                    <label for="username">Username</label>
                    <br><br>
                    <input type="password">
                    <label for="password">Password</label>
                    <br><br>
                    <input type="email">
                    <label for="email">Email</label>
                    <br><br>
                    <input type="number">
                    <label for="number">Phone Number</label>
                    <br><br>
                    <button>Submit</button>
                    <p>Already have an account?Login <a href="login">Here</a></p>
                </form>
            </div>
        </div>

        <div class="section">
            <div class="phones">
                <h4><a href="phones">phones</a></h4>
                <img src="apple_iphone12(2).png" alt="iphone">
            </div>

            <div class="laptops">
                <h4><a href="laptops">laptops</a></h4>
                <img src="laptop2.png" alt="laptop">
            </div>

            <div class="accessories">
                <h4><a href="accessories">accessories</a></h4>
                <img src="apple-watch.png" alt="smartwatch">
            </div>

        </div>

        <div class="footer">
            <ul>
                <li><a href="tel:07019952901">Contact us</a></li>
                <li><a href="mailto:jiade1233@gmail.com">Email</a></li>
                <li><a href="faq">FAQ</a></li>
            </ul>
        </div>

    </div>
</body>
</html>
